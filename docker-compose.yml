# ============================================
#  WhatsApp MCP — Multi-Instance Docker Setup
# ============================================
#  Naming: whatsapp-{role}-{instance}
#  Roles: bridge (Go), bot (Python AI)
# ============================================

services:
  # ── Cleaner in Manchester ──────────────────
  bridge-cleaner:
    build: .
    container_name: whatsapp-bridge-cleaner
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./instances/cleaner/store:/app/whatsapp-bridge/store
    stdin_open: true
    tty: true
    networks:
      - whatsapp-net-cleaner

  bot-cleaner:
    build: ./bot
    container_name: whatsapp-bot-cleaner
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./bot:/app
      - ./instances/cleaner/store:/data/bridge-store:ro
      - ./instances/cleaner/context.yaml:/app/context.yaml:ro
    environment:
      - INSTANCE_NAME=cleaner
      - BRIDGE_API_URL=http://bridge-cleaner:8080/api
      - BRIDGE_DB_PATH=/data/bridge-store/messages.db
      - CONFIG_PATH=/app/context.yaml
      - PYTHONUNBUFFERED=1
    depends_on:
      - bridge-cleaner
    networks:
      - whatsapp-net-cleaner

  dashboard-cleaner:
    build: ./dashboard
    container_name: whatsapp-dashboard-cleaner
    restart: unless-stopped
    ports:
      - "8091:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./dashboard:/app
      - ./instances/cleaner/store:/data/bridge-store:ro
      - ./instances/cleaner/context.yaml:/app/context.yaml
    environment:
      - INSTANCE_NAME=cleaner
      - BRIDGE_DB_PATH=/data/bridge-store/messages.db
      - SQL_SERVER=host.docker.internal,14314
      - SQL_DATABASE=master
      - SQL_USER=sa
      - SQL_PASSWORD=Berrysandkeys-99
      - LM_STUDIO_URL=http://host.docker.internal:12344
      - LM_STUDIO_API_KEY=sk-lm-MHagBXW8:HChqzXnesRTQOVQbuPGJ
      - CONFIG_PATH=/app/context.yaml
    depends_on:
      - bridge-cleaner
    networks:
      - whatsapp-net-cleaner
